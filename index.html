<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interaktiver Quintenzirkel mit Modi-Schablone</title>
  <style>
    :root {
      --bg: #f4f3ee;
      --surface: #ffffff;
      --surface-2: #ebe9e0;
      --text: #2c2c2a;
      --text-soft: #5f5e5a;
      --text-faint: #888780;
      --border: rgba(0, 0, 0, 0.18);
      --border-strong: rgba(0, 0, 0, 0.32);
      --accent: #185fa5;
      --accent-soft: #e6f1fb;
      --root-col: #d85a30;
      /* Grundton  */
      --third-col: #1d9e75;
      /* Terz      */
      --fifth-col: #7f77dd;
      /* Quinte    */
      --seventh-col: #c07820;
      --stencil-fill: rgba(83, 74, 183, 0.30);
      --stencil-stroke: #534ab7;
      --stencil-text: #26215c;
    }

    @media (prefers-color-scheme: dark) {
      :root:not(.light) {
        --bg: #1f1e1c;
        --surface: #2a2926;
        --surface-2: #34332f;
        --text: #ece9e0;
        --text-soft: #b4b2a9;
        --text-faint: #888780;
        --border: rgba(255, 255, 255, 0.20);
        --border-strong: rgba(255, 255, 255, 0.38);
        --accent: #85b7eb;
        --accent-soft: #12365a;
        --root-col: #f0997b;
        --third-col: #5dcaa5;
        --fifth-col: #afa9ec;
        --seventh-col: #e8b06a;
        --stencil-fill: rgba(175, 169, 236, 0.22);
        --stencil-stroke: #afa9ec;
        --stencil-text: #eeedfe;
      }
    }

    :root.dark {
      --bg: #1f1e1c;
      --surface: #2a2926;
      --surface-2: #34332f;
      --text: #ece9e0;
      --text-soft: #b4b2a9;
      --text-faint: #888780;
      --border: rgba(255, 255, 255, 0.20);
      --border-strong: rgba(255, 255, 255, 0.38);
      --accent: #85b7eb;
      --accent-soft: #12365a;
      --root-col: #f0997b;
      --third-col: #5dcaa5;
      --fifth-col: #afa9ec;
      --seventh-col: #e8b06a;
      --stencil-fill: rgba(175, 169, 236, 0.22);
      --stencil-stroke: #afa9ec;
      --stencil-text: #eeedfe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 0.25rem;
    }

    .lede {
      font-size: 14px;
      color: var(--text-soft);
      margin: 0 0 1.5rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 1rem;
    }

    .grp {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .grp>label {
      font-size: 13px;
      color: var(--text-soft);
      margin-right: 2px;
    }

    button {
      font: inherit;
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      transition: background 0.12s, transform 0.05s;
    }

    button:hover {
      background: var(--surface-2);
    }

    button:active {
      transform: scale(0.97);
    }

    button.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .seg-chord {
      cursor: pointer;
    }

    .seg-chord:hover .seg-bg {
      fill: var(--surface-2);
    }

    .hint {
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
      margin-top: 8px;
    }

    .panel {
      margin-top: 1rem;
      background: var(--surface-2);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      min-height: 70px;
    }

    .panel.empty {
      color: var(--text-faint);
      font-size: 14px;
    }

    .panel h2 {
      margin: 0 0 2px;
      font-size: 18px;
      font-weight: 500;
    }

    .panel .sub {
      font-size: 13px;
      color: var(--text-soft);
      margin: 0 0 12px;
    }

    .voicings {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .voicing {
      text-align: center;
    }

    .voicing .vlabel {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 4px;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
    }

    .voicing-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-soft);
    }
    .voicing-nav button {
      padding: 2px 10px;
      font-size: 15px;
      line-height: 1;
    }

    .ext-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .ext-toggle button {
      font-size: 12px;
      padding: 3px 10px;
    }

    .main-layout {
      display: block;
    }

    @media (min-width: 900px) and (min-height: 700px) {
      .main-layout {
        display: grid;
        grid-template-columns: minmax(0, 480px) minmax(0, 1fr);
        grid-template-rows: auto auto;
        gap: 0 1.5rem;
        align-items: start;
      }
      .stage {
        grid-column: 1;
        grid-row: 1;
        margin: 0;
      }
      .hint {
        grid-column: 1;
        grid-row: 2;
      }
      #panel {
        grid-column: 2;
        grid-row: 1 / 3;
        margin-top: 0;
        max-height: calc(100vh - 220px);
        overflow-y: auto;
        position: sticky;
        top: 1rem;
      }
    }

    .scale-section {
      margin-top: 1.5rem;
    }

    .scale-section h3 {
      font-size: 15px;
      font-weight: 500;
      margin: 0 0 0.5rem;
      color: var(--text-soft);
    }

    .scale-toggle {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .scale-toggle button {
      font-size: 12px;
      padding: 3px 10px;
    }

    .fretboard-wrap {
      overflow-x: auto;
    }

    .diatonic-chords {
      margin-top: 1rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .diatonic-chord {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      min-width: 52px;
    }

    .diatonic-chord .dc-degree {
      font-size: 11px;
      color: var(--text-faint);
      margin-bottom: 2px;
    }

    .diatonic-chord .dc-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .diatonic-chord .dc-type {
      font-size: 11px;
      margin-top: 2px;
    }

    .diatonic-chord.dc-major .dc-type { color: var(--accent); }
    .diatonic-chord.dc-minor .dc-type { color: var(--third-col); }
    .diatonic-chord.dc-dim   .dc-type { color: var(--text-faint); }

    footer {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--text-faint);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
    }
  </style>
</head>

<body>
  <div class="page">
<div class="controls">
      <div class="grp">
        <label>Griffe</label>
        <button class="active" id="btn-guitar">Gitarre</button>
        <button id="btn-piano">Klavier</button>
      </div>
      <div class="grp" id="leftie-grp">
        <button id="btn-leftie">Links-Händer</button>
      </div>
      <div class="grp">
        <label>Modi-Schablone</label>
        <button id="btn-modes">einblenden</button>
      </div>
      <div class="grp" id="rotate-grp" style="display:none;">
        <button id="btn-ccw" aria-label="gegen Uhrzeigersinn drehen">&#8634;</button>
        <span id="mode-key" style="font-size:13px; font-weight:500; min-width:90px; text-align:center;">Ion auf C</span>
        <button id="btn-cw" aria-label="im Uhrzeigersinn drehen">&#8635;</button>
      </div>
      <div class="grp" style="margin-left:auto;">
        <button id="btn-theme" aria-label="Dark/Light Mode umschalten">&#9790;</button>
      </div>
    </div>

    <div class="main-layout">
      <div class="stage">
        <svg id="cof-svg" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg" role="img"
          aria-label="Quintenzirkel mit drehbarer Modi-Schablone"></svg>
      </div>
      <div class="panel empty" id="panel">Noch kein Akkord gewählt — klicke auf ein Segment im Zirkel.</div>
    </div>

    <div id="scale-section" class="scale-section" style="display:none;">
      <h3 id="scale-heading"></h3>
      <div class="scale-toggle" id="scale-toggle"></div>
      <div id="scale-display"></div>
    </div>

  </div>

  <script>
    (function () {
      "use strict";
      var SVG_NS = "http://www.w3.org/2000/svg";
      var svg = document.getElementById("cof-svg");
      var CX = 310, CY = 310;

      var MAJOR = ["C", "G", "D", "A", "E", "B", "F#", "C#", "G#", "D#", "A#", "F"];
      var MAJOR_DISP = ["C", "G", "D", "A", "E", "H", "Fis", "Des", "As", "Es", "B", "F"];
      var MINOR = ["Am", "Em", "Bm", "F#m", "C#m", "G#m", "D#m", "A#m", "Fm", "Cm", "Gm", "Dm"];
      var MINOR_DISP = ["Am", "Em", "Hm", "Fism", "Cism", "Gism", "Dism", "Bm", "Fm", "Cm", "Gm", "Dm"];
      var DIM = ["Bdim", "F#dim", "C#dim", "G#dim", "D#dim", "A#dim", "Fdim", "Cdim", "Gdim", "Ddim", "Adim", "Edim"];
      var DIM_DISP = ["H\u00b0", "Fis\u00b0", "Cis\u00b0", "Gis\u00b0", "Dis\u00b0", "Ais\u00b0", "F\u00b0", "C\u00b0", "G\u00b0", "D\u00b0", "A\u00b0", "E\u00b0"];

      var RING = { major: { r1: 60, r2: 128 }, minor: { r1: 128, r2: 196 }, dim: { r1: 196, r2: 264 } };
      // 12 pastel rainbow hues, evenly spaced (30° steps), starting at C=200° (blue-ish)
      // Light: s=55%, l=88%  Dark: s=40%, l=28%
      var SEG_FILL = (function() {
        var out = [], startHue = 200;
        for (var i = 0; i < 12; i++) {
          var h = (startHue + i * 30) % 360;
          out.push("hsl(" + h + ",55%,88%)");
        }
        return out;
      })();
      var SEG_FILL_DARK = (function() {
        var out = [], startHue = 200;
        for (var i = 0; i < 12; i++) {
          var h = (startHue + i * 30) % 360;
          out.push("hsl(" + h + ",40%,28%)");
        }
        return out;
      })();
      var darkMode = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

      // chord roots and triad construction
      var NOTE_IDX = { "C": 0, "C#": 1, "D": 2, "D#": 3, "E": 4, "F": 5, "F#": 6, "G": 7, "G#": 8, "A": 9, "A#": 10, "B": 11 };
      function chordIntervals(type, ext) {
        var base = type === "major" ? [0,4,7] : type === "minor" ? [0,3,7] : [0,3,6];
        if (ext === "maj7")  return base.concat([11]);
        if (ext === "m7")    return base.concat([10]);
        if (ext === "m7b5")  return base.concat([10]);
        return base;
      }
      function triad(root, type) {
        var r = NOTE_IDX[root];
        return chordIntervals(type, "triad").map(function(s){ return (r+s)%12; });
      }
      function roleMap(root, type, ext) {
        ext = ext || "triad";
        var r = NOTE_IDX[root];
        var ivs = chordIntervals(type, ext);
        var m = {};
        var roleNames = ["root","third","fifth","seventh"];
        ivs.forEach(function(iv, i){ m[(r+iv)%12] = roleNames[i]; });
        return m;
      }

      // guitar voicings: 6 strings low->high; -1 muted, 0 open, n fret
      // each chord is an array of voicings (array-of-arrays)
      var GUITAR = {
        "C":   [[-1,3,2,0,1,0], [-1,3,5,5,5,3]],
        "G":   [[3,2,0,0,0,3],  [3,5,5,4,3,3]],
        "D":   [[-1,-1,0,2,3,2],[-1,5,7,7,7,5]],
        "A":   [[-1,0,2,2,2,0], [5,7,7,6,5,5]],
        "E":   [[0,2,2,1,0,0],  [0,2,2,1,0,0]],
        "B":   [[-1,2,4,4,4,2], [7,9,9,8,7,7]],
        "F#":  [[2,4,4,3,2,2],  [2,4,4,3,2,2]],
        "C#":  [[-1,4,6,6,6,4], [9,11,11,10,9,9]],
        "G#":  [[4,6,6,5,4,4],  [4,6,6,5,4,4]],
        "D#":  [[-1,6,8,8,8,6], [11,13,13,12,11,11]],
        "A#":  [[-1,1,3,3,3,1], [6,8,8,7,6,6]],
        "F":   [[1,3,3,2,1,1],  [1,3,3,2,1,1]],
        "Am":  [[-1,0,2,2,1,0], [5,7,7,5,5,5]],
        "Em":  [[0,2,2,0,0,0],  [0,2,2,0,0,0]],
        "Bm":  [[-1,2,4,4,3,2], [7,9,9,7,7,7]],
        "F#m": [[2,4,4,2,2,2],  [2,4,4,2,2,2]],
        "C#m": [[-1,4,6,6,5,4], [9,11,11,9,9,9]],
        "G#m": [[4,6,6,4,4,4],  [4,6,6,4,4,4]],
        "D#m": [[-1,6,8,8,7,6], [11,13,13,11,11,11]],
        "A#m": [[-1,1,3,3,2,1], [6,8,8,6,6,6]],
        "Fm":  [[1,3,3,1,1,1],  [1,3,3,1,1,1]],
        "Cm":  [[-1,3,5,5,4,3], [8,10,10,8,8,8]],
        "Gm":  [[3,5,5,3,3,3],  [3,5,5,3,3,3]],
        "Dm":  [[-1,-1,0,2,3,1],[10,12,12,10,10,10]],
        "Bdim":  [[-1,2,3,4,3,-1],[-1,2,3,4,3,-1]],
        "F#dim": [[2,3,4,2,-1,-1],[2,3,4,2,-1,-1]],
        "C#dim": [[-1,4,5,6,5,-1],[-1,4,5,6,5,-1]],
        "G#dim": [[4,5,6,4,-1,-1],[4,5,6,4,-1,-1]],
        "D#dim": [[-1,6,7,8,7,-1],[-1,6,7,8,7,-1]],
        "A#dim": [[-1,1,2,3,2,-1],[-1,1,2,3,2,-1]],
        "Fdim":  [[1,2,3,1,-1,-1],[1,2,3,1,-1,-1]],
        "Cdim":  [[-1,3,4,5,4,-1],[-1,3,4,5,4,-1]],
        "Gdim":  [[3,4,5,3,-1,-1],[3,4,5,3,-1,-1]],
        "Ddim":  [[-1,5,6,7,6,-1],[-1,5,6,7,6,-1]],
        "Adim":  [[-1,0,1,2,1,-1],[-1,0,1,2,1,-1]],
        "Edim":  [[0,1,2,0,-1,-1],[0,1,2,0,-1,-1]]
      };
      var GUITAR7 = {
        "Cmaj7":  [-1,3,2,0,0,0],
        "Gmaj7":  [3,2,0,0,0,2],
        "Dmaj7":  [-1,-1,0,2,2,2],
        "Amaj7":  [-1,0,2,1,2,0],
        "Emaj7":  [0,2,1,1,0,0],
        "Bmaj7":  [-1,2,4,3,4,2],
        "F#maj7": [2,4,3,3,2,2],
        "C#maj7": [-1,4,6,5,6,4],
        "G#maj7": [4,6,5,5,4,4],
        "D#maj7": [-1,6,8,7,8,6],
        "A#maj7": [-1,1,3,2,3,1],
        "Fmaj7":  [1,3,2,2,1,0],
        "Am7":  [-1,0,2,0,1,0],
        "Em7":  [0,2,2,0,3,0],
        "Bm7":  [-1,2,4,2,3,2],
        "F#m7": [2,4,2,2,2,2],
        "C#m7": [-1,4,6,4,5,4],
        "G#m7": [4,6,4,4,4,4],
        "D#m7": [-1,6,8,6,7,6],
        "A#m7": [-1,1,3,1,2,1],
        "Fm7":  [1,3,1,1,1,1],
        "Cm7":  [-1,3,5,3,4,3],
        "Gm7":  [3,5,3,3,3,3],
        "Dm7":  [-1,-1,0,2,1,1],
        "Bm7b5":  [-1,2,3,2,3,-1],
        "F#m7b5": [2,3,2,2,-1,-1],
        "C#m7b5": [-1,4,5,4,5,-1],
        "G#m7b5": [4,5,4,4,-1,-1],
        "D#m7b5": [-1,6,7,6,7,-1],
        "A#m7b5": [-1,1,2,1,2,-1],
        "Fm7b5":  [1,2,1,1,0,-1],
        "Cm7b5":  [-1,3,4,3,4,-1],
        "Gm7b5":  [3,4,3,3,-1,-1],
        "Dm7b5":  [-1,-1,0,1,1,1],
        "Am7b5":  [-1,0,1,0,1,-1],
        "Em7b5":  [0,1,0,0,-1,-1]
      };
      // standard tuning pitch classes, low E -> high e
      var STRING_PC = [4, 9, 2, 7, 11, 4];

      // -- geometry --------------------------------------------------------
      function pt(r, deg) { var a = (deg - 90) * Math.PI / 180; return [CX + r * Math.cos(a), CY + r * Math.sin(a)]; }
      function segPath(r1, r2, a1, a2) {
        var p1 = pt(r2, a1), p2 = pt(r2, a2), p3 = pt(r1, a2), p4 = pt(r1, a1);
        return "M" + p1[0] + " " + p1[1] + " A" + r2 + " " + r2 + " 0 0 1 " + p2[0] + " " + p2[1] +
          " L" + p3[0] + " " + p3[1] + " A" + r1 + " " + r1 + " 0 0 0 " + p4[0] + " " + p4[1] + " Z";
      }
      function mk(name, attrs) {
        var e = document.createElementNS(SVG_NS, name);
        for (var k in attrs) { e.setAttribute(k, attrs[k]); } return e;
      }

      // -- build rings -----------------------------------------------------
      // accidentals per major key, same order as MAJOR array
      var KEY_SIG = ["", "1♯", "2♯", "3♯", "4♯", "5♯", "6♯", "5♭", "4♭", "3♭", "2♭", "1♭"];
      var ringDefs = [
        { key: "major", names: MAJOR, disp: MAJOR_DISP, type: "major" },
        { key: "minor", names: MINOR, disp: MINOR_DISP, type: "minor" },
        { key: "dim", names: DIM, disp: DIM_DISP, type: "dim" }
      ];
      ringDefs.forEach(function (rd) {
        var R = RING[rd.key];
        for (var i = 0; i < 12; i++) {
          var a1 = i * 30 - 15, a2 = i * 30 + 15, mid = i * 30;
          var g = mk("g", { class: "seg-chord" });
          g.setAttribute("data-chord", rd.names[i]);
          g.setAttribute("data-disp", rd.disp[i]);
          g.setAttribute("data-type", rd.type);
          var fill = darkMode ? SEG_FILL_DARK[i] : SEG_FILL[i];
          var bg = mk("path", {
            class: "seg-bg", d: segPath(R.r1, R.r2, a1, a2),
            fill: fill, stroke: "var(--border-strong)", "stroke-width": "1"
          });
          g.appendChild(bg);
          var lr = (R.r1 + R.r2) / 2, lp = pt(lr, mid);
          var nameY = rd.key === "major" && KEY_SIG[i] !== "" ? lp[1] - 1 : lp[1] + 5;
          var txt = mk("text", {
            x: lp[0], y: nameY, "text-anchor": "middle",
            "font-size": "15", "font-weight": "600", fill: "var(--text)"
          });
          txt.textContent = rd.disp[i];
          g.appendChild(txt);
          if (rd.key === "major" && KEY_SIG[i] !== "") {
            var sig = mk("text", {
              x: lp[0], y: lp[1] + 14, "text-anchor": "middle",
              "font-size": "10", "font-weight": "400", fill: "var(--text-faint)"
            });
            sig.textContent = KEY_SIG[i];
            g.appendChild(sig);
          }
          (function(el, segIndex, ringKey) {
            el.addEventListener("click", function() {
              if (modesOn && ringKey === "major") {
                rotation = segIndex;
                updateStencil();
              } else {
                showChord(el);
              }
            });
          })(g, i, rd.key);
          svg.appendChild(g);
        }
      });
      // hub
      svg.appendChild(mk("circle", {
        cx: CX, cy: CY, r: RING.major.r1 - 2,
        fill: "var(--surface-2)", stroke: "var(--border)", "stroke-width": "1"
      }));
      var h1 = mk("text", { x: CX, y: CY - 4, "text-anchor": "middle", "font-size": "13", fill: "var(--text-faint)" });
      h1.textContent = "Quinten"; svg.appendChild(h1);
      var h2 = mk("text", { x: CX, y: CY + 14, "text-anchor": "middle", "font-size": "13", fill: "var(--text-faint)" });
      h2.textContent = "zirkel"; svg.appendChild(h2);

      // -- mode stencil ----------------------------------------------------
      var stencil = mk("g", { id: "stencil", opacity: "0", "pointer-events": "none" });
      function stencilCell(r1, r2, rel, label) {
        var a1 = rel * 30 - 15, a2 = rel * 30 + 15, mid = rel * 30;
        var g = mk("g", {});
        g.appendChild(mk("path", {
          d: segPath(r1, r2, a1, a2),
          fill: "var(--stencil-fill)", stroke: "var(--stencil-stroke)", "stroke-width": "2.5"
        }));
        var lr = r2 - 10, lp = pt(lr, mid);
        var t = mk("text", {
          x: lp[0], y: lp[1] + 4, "text-anchor": "middle",
          "font-size": "11", "font-weight": "700", fill: "var(--stencil-text)"
        });
        t.textContent = label; g.appendChild(t);
        return g;
      }
      var Rm = RING.major, Rn = RING.minor, Rd = RING.dim;
      [["Lyd", -1], ["Ion", 0], ["Mix", 1]].forEach(function (c) { stencil.appendChild(stencilCell(Rm.r1, Rm.r2, c[1], c[0])); });
      [["Dor", -1], ["Aeo", 0], ["Phr", 1]].forEach(function (c) { stencil.appendChild(stencilCell(Rn.r1, Rn.r2, c[1], c[0])); });
      stencil.appendChild(stencilCell(Rd.r1, Rd.r2, 0, "Loc"));
      svg.appendChild(stencil);

      // -- scale data -------------------------------------------------------
      var SCALE_DEFS = {
        major: [
          { id: "ionian",     label: "Ionisch (Dur)",  intervals: [0,2,4,5,7,9,11] },
          { id: "lydian",     label: "Lydisch",        intervals: [0,2,4,6,7,9,11] },
          { id: "mixolydian", label: "Mixolydisch",    intervals: [0,2,4,5,7,9,10] },
          { id: "pentatonic", label: "Pentatonik Dur", intervals: [0,2,4,7,9]       }
        ],
        minor: [
          { id: "aeolian",    label: "Äolisch (Moll)", intervals: [0,2,3,5,7,8,10] },
          { id: "dorian",     label: "Dorisch",        intervals: [0,2,3,5,7,9,10] },
          { id: "phrygian",   label: "Phrygisch",      intervals: [0,1,3,5,7,8,10] },
          { id: "locrian",    label: "Lokrisch",       intervals: [0,1,3,5,6,8,10] },
          { id: "pentatonic_m", label: "Pentatonik Moll", intervals: [0,3,5,7,10]     },
          { id: "harmonic",     label: "Harmonisch",      intervals: [0,2,3,5,7,8,11] },
          { id: "melodic",      label: "Melodisch",       intervals: [0,2,3,5,7,9,11] },
          { id: "blues",        label: "Blues",           intervals: [0,3,5,6,7,10]   }
        ]
      };

      // -- fretboard renderer -----------------------------------------------
      // Shows frets 0 (open) through 15, 6 strings
      function fretboardSVG(rootPc, intervals) {
        var scaleSet = {};
        intervals.forEach(function(iv) { scaleSet[(rootPc + iv) % 12] = true; });

        var nFrets = 15, nStrings = 6;
        var padL = 28, padT = 20, padR = 12, padB = 20;
        var fretW = 36, stringH = 22;
        var W = padL + (nFrets + 1) * fretW + padR;
        var H = padT + (nStrings - 1) * stringH + padB;

        var s = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';

        // nut
        var nutX = leftHanded ? (padL + fretW * nFrets + fretW * 0.5) : (padL + fretW * 0.5);
        s += '<line x1="' + nutX + '" y1="' + padT + '" x2="' + nutX + '" y2="' + (H - padB) + '" stroke="var(--border-strong)" stroke-width="3"/>';

        // fret lines
        for (var f = 1; f <= nFrets; f++) {
          var fx = leftHanded ? (padL + fretW * (nFrets - f) + fretW * 0.5) : (padL + fretW * f + fretW * 0.5);
          s += '<line x1="' + fx + '" y1="' + padT + '" x2="' + fx + '" y2="' + (H - padB) + '" stroke="var(--border)" stroke-width="1"/>';
        }

        // fret numbers
        var markerFrets = [3, 5, 7, 9, 12, 15];
        for (var f = 0; f <= nFrets; f++) {
          var fx = leftHanded ? (padL + fretW * (nFrets - f) + fretW * 0.5) : (padL + fretW * f + fretW * 0.5);
          var label = f === 0 ? "0" : String(f);
          var isMark = markerFrets.indexOf(f) !== -1;
          s += '<text x="' + fx + '" y="' + (padT - 6) + '" text-anchor="middle" font-size="9" fill="' + (isMark ? "var(--text-soft)" : "var(--text-faint)") + '" font-weight="' + (isMark ? "600" : "400") + '">' + label + '</text>';
        }

        // string lines
        var stringNames = ["E", "A", "D", "G", "H", "e"];
        for (var st = 0; st < nStrings; st++) {
          var sy = padT + st * stringH;
          var thick = st < 3 ? 2 : 1;
          s += '<line x1="' + padL + '" y1="' + sy + '" x2="' + (W - padR) + '" y2="' + sy + '" stroke="var(--border-strong)" stroke-width="' + thick + '"/>';
          var nameX = leftHanded ? (W - padR + 6) : (padL - 6);
          var anchor = leftHanded ? "start" : "end";
          s += '<text x="' + nameX + '" y="' + (sy + 4) + '" text-anchor="' + anchor + '" font-size="10" fill="var(--text-faint)">' + stringNames[st] + '</text>';
        }

        // dots
        for (var st = 0; st < nStrings; st++) {
          var sy = padT + st * stringH;
          for (var f = 0; f <= nFrets; f++) {
            var pc = (STRING_PC[st] + f) % 12;
            if (!scaleSet[pc]) continue;
            var isRoot = (pc === rootPc);
            var fx = leftHanded ? (padL + fretW * (nFrets - f) + fretW * 0.5) : (padL + fretW * f + fretW * 0.5);
            var r = 8;
            s += '<circle cx="' + fx + '" cy="' + sy + '" r="' + r + '" fill="' + (isRoot ? "var(--root-col)" : "var(--accent-soft)") + '" stroke="' + (isRoot ? "var(--root-col)" : "var(--accent)") + '" stroke-width="1.5"/>';
          }
        }

        return s + '</svg>';
      }

      // -- diatonic chord derivation ----------------------------------------
      // Roman numerals for 7 scale degrees
      var ROMAN = ["I","II","III","IV","V","VI","VII"];
      // Note names for display (prefer flats for black keys in scale context)
      var NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

      // Given a root pc and scale intervals, build diatonic triads.
      // For each scale degree, stack 3rds (skip one scale tone) to get triad.
      // Returns array of {degree, roman, name, chordType} or null if no complete triad.
      function diatonicChords(rootPc, intervals) {
        var n = intervals.length;
        // need at least 5 tones to form a triad by stacking thirds
        if (n < 5) return null;
        var result = [];
        for (var i = 0; i < n; i++) {
          var root = (rootPc + intervals[i]) % 12;
          // third = two scale steps up (wrap)
          var thirdIv = intervals[(i + 2) % n];
          if ((i + 2) >= n) thirdIv += 12; // wrap to next octave
          var thirdInterval = thirdIv - intervals[i];
          if (thirdInterval < 0) thirdInterval += 12;
          // fifth = four scale steps up (wrap)
          var fifthIv = intervals[(i + 4) % n];
          if ((i + 4) >= n) fifthIv += 12;
          var fifthInterval = fifthIv - intervals[i];
          if (fifthInterval < 0) fifthInterval += 12;

          var chordType;
          if (thirdInterval === 4 && fifthInterval === 7) chordType = "major";
          else if (thirdInterval === 3 && fifthInterval === 7) chordType = "minor";
          else if (thirdInterval === 3 && fifthInterval === 6) chordType = "dim";
          else if (thirdInterval === 4 && fifthInterval === 8) chordType = "aug";
          else chordType = null;

          var roman = ROMAN[i] || (i + 1).toString();
          var nameRoman = chordType === "minor" || chordType === "dim" ? roman.toLowerCase() : roman;
          if (chordType === "dim") nameRoman += "°";

          result.push({
            degree: i + 1,
            roman: nameRoman,
            name: NOTE_NAMES[root],
            chordType: chordType
          });
        }
        return result;
      }

      // -- scale panel -------------------------------------------------------
      var scaleId = null;

      function renderScalePanel() {
        if (!lastChordEl) return;
        var type = lastChordEl.getAttribute("data-type");
        var chord = lastChordEl.getAttribute("data-chord");
        var disp  = lastChordEl.getAttribute("data-disp");
        var section = document.getElementById("scale-section");

        if (type === "dim") { section.style.display = "none"; return; }

        section.style.display = "";
        var scaleDefs = SCALE_DEFS[type];

        // default to first scale on new chord
        if (!scaleId || !scaleDefs.some(function(d){ return d.id === scaleId; })) {
          scaleId = scaleDefs[0].id;
        }

        var root = chord.replace(/m$/, "");
        var rootPc = NOTE_IDX[root];

        document.getElementById("scale-heading").textContent = disp + " — Tonleitern";

        var toggleEl = document.getElementById("scale-toggle");
        toggleEl.innerHTML = scaleDefs.map(function(def) {
          return '<button class="scale-btn' + (scaleId === def.id ? ' active' : '') + '" data-scale="' + def.id + '">' + def.label + '</button>';
        }).join("");
        toggleEl.querySelectorAll(".scale-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            scaleId = this.getAttribute("data-scale");
            renderScalePanel();
          });
        });

        var def = scaleDefs.filter(function(d){ return d.id === scaleId; })[0];
        var displayEl = document.getElementById("scale-display");

        var scaleHtml;
        if (instrument === "guitar") {
          scaleHtml = '<div class="fretboard-wrap">' + fretboardSVG(rootPc, def.intervals) + '</div>';
        } else {
          var notes = def.intervals.map(function(iv) { return rootPc + iv; });
          var roleMap2 = {};
          notes.forEach(function(n) { roleMap2[n % 12] = n % 12 === rootPc ? "root" : "fifth"; });
          scaleHtml = pianoSVG(notes, roleMap2);
        }

        // diatonic chords
        var chords = diatonicChords(rootPc, def.intervals);
        var chordsHtml = "";
        if (chords) {
          var typeLabel = { major: "Dur", minor: "Moll", dim: "verm.", aug: "überm." };
          chordsHtml = '<div class="diatonic-chords">' +
            chords.map(function(c) {
              var cls = c.chordType === "major" ? "dc-major"
                      : c.chordType === "minor" ? "dc-minor"
                      : c.chordType === "dim"   ? "dc-dim" : "dc-other";
              var label = c.chordType ? typeLabel[c.chordType] : "—";
              var dispName = (c.chordType === "minor" || c.chordType === "dim")
                ? c.name.charAt(0).toLowerCase() + c.name.slice(1)
                : c.name;
              return '<div class="diatonic-chord ' + cls + '">' +
                '<div class="dc-degree">' + c.roman + '</div>' +
                '<div class="dc-name">' + dispName + '</div>' +
                '<div class="dc-type">' + label + '</div>' +
                '</div>';
            }).join("") +
          '</div>';
        }

        displayEl.innerHTML = scaleHtml + chordsHtml;
      }

      // -- state -----------------------------------------------------------
      var instrument = "guitar", modesOn = false, leftHanded = false, rotation = 0, lastChordEl = null;
      var voicingIndex = 0;
      var chordExt = "triad";

      function updateStencil() {
        stencil.setAttribute("transform", "rotate(" + (rotation * 30) + " " + CX + " " + CY + ")");
        stencil.setAttribute("opacity", modesOn ? "1" : "0");
        document.getElementById("mode-key").textContent =
          "Ion auf " + MAJOR_DISP[((rotation % 12) + 12) % 12];
      }

      // -- guitar renderer with role colouring -----------------------------
      function roleColor(role) {
        return role === "root"    ? "var(--root-col)"
             : role === "third"   ? "var(--third-col)"
             : role === "seventh" ? "var(--seventh-col)"
             : "var(--fifth-col)";
      }
      function renderGuitar(voicingArray, chord, type) {
        var v = voicingArray;
        if (!v) return "<p style='font-size:13px;color:var(--text-soft)'>Kein Griff hinterlegt.</p>";
        var rootName = chord.replace(/dim$/, "").replace(/m$/, "");
        var roles = roleMap(rootName, type, chordExt);
        var W = 140, H = 160, padL = 22, padT = 26, padB = 20, nStr = 6, nFr = 5;
        var sGap = (W - 2 * padL) / (nStr - 1), fGap = (H - padT - padB) / nFr;
        var played = v.filter(function (f) { return f > 0; });
        var baseFret = played.length ? Math.min.apply(null, played) : 1;
        if (baseFret < 1) baseFret = 1;
        var s = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
        for (var fr = 0; fr <= nFr; fr++) {
          var y = padT + fr * fGap;
          var thick = (fr === 0 && baseFret === 1) ? 3 : 1;
          s += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padL) + '" y2="' + y + '" stroke="var(--border-strong)" stroke-width="' + thick + '"/>';
        }
        for (var st = 0; st < nStr; st++) {
          var x = leftHanded ? (padL + (nStr - 1 - st) * sGap) : (padL + st * sGap);
          s += '<line x1="' + x + '" y1="' + padT + '" x2="' + x + '" y2="' + (H - padB) + '" stroke="var(--border-strong)" stroke-width="1"/>';
        }
        if (baseFret > 1) {
          s += '<text x="' + (padL - 7) + '" y="' + (padT + fGap * 0.7) + '" text-anchor="end" font-size="11" fill="var(--text-faint)">' + baseFret + 'fr</text>';
        }
        for (var st = 0; st < nStr; st++) {
          var f = v[st], x = leftHanded ? (padL + (nStr - 1 - st) * sGap) : (padL + st * sGap);
          if (f < 0) {
            s += '<text x="' + x + '" y="' + (padT - 9) + '" text-anchor="middle" font-size="13" fill="var(--text-faint)">\u00d7</text>';
            continue;
          }
          var pc = (STRING_PC[st] + f) % 12;
          var role = roles[pc] || "fifth";
          var col = roleColor(role);
          if (f === 0) {
            s += '<circle cx="' + x + '" cy="' + (padT - 13) + '" r="6" fill="none" stroke="' + col + '" stroke-width="2"/>';
          } else {
            var rel = f - baseFret;
            var cy = padT + rel * fGap + fGap / 2;
            s += '<circle cx="' + x + '" cy="' + cy + '" r="9" fill="' + col + '"/>';
          }
        }
        return s + '</svg>';
      }

      // -- piano renderer (root + inversions) ------------------------------
      // 2 octaves: C0..B1 = white keys 0..13 (15 whites), semitones 0..23
      // pcWhite[pc] = white-key index within one octave (0=C,1=D,2=E,3=F,4=G,5=A,6=B)
      var PC_WHITE = { 0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6 };
      var PC_BLACK_PARENT = { 1:0, 3:1, 6:3, 8:4, 10:5 }; // black key sits right of this white index
      function pianoSVG(notesOrdered, roles) {
        var nWhite = 15, W = 270, H = 100, wW = W / nWhite;
        var s = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
        // white keys
        for (var w = 0; w < nWhite; w++) {
          s += '<rect x="' + (w * wW) + '" y="0" width="' + (wW - 1) + '" height="' + H + '" fill="var(--surface)" stroke="var(--border-strong)" stroke-width="1"/>';
        }
        // black keys: 2 octaves → positions [1,3,6,8,10] + 12 offset
        [0, 12].forEach(function(octBase) {
          [1, 3, 6, 8, 10].forEach(function(pc) {
            var oct = octBase / 12;
            var whiteIdx = PC_BLACK_PARENT[pc] + oct * 7;
            var x = (whiteIdx + 1) * wW - wW * 0.32;
            s += '<rect x="' + x + '" y="0" width="' + (wW * 0.64) + '" height="' + (H * 0.62) + '" fill="var(--text)" stroke="var(--border-strong)" stroke-width="1"/>';
          });
        });
        // markers
        notesOrdered.forEach(function(n) {
          var pc = n % 12, oct = Math.floor(n / 12);
          var role = roles[pc];
          var col = role === "root"    ? "var(--root-col)"
                  : role === "third"   ? "var(--third-col)"
                  : role === "seventh" ? "var(--seventh-col)"
                  : "var(--fifth-col)";
          if (PC_WHITE.hasOwnProperty(pc)) {
            var wi = PC_WHITE[pc] + oct * 7;
            s += '<circle cx="' + (wi * wW + wW / 2) + '" cy="' + (H - 13) + '" r="6" fill="' + col + '"/>';
          } else {
            var bi = PC_BLACK_PARENT[pc] + oct * 7;
            var bx = (bi + 1) * wW;
            s += '<circle cx="' + bx + '" cy="' + (H * 0.62 - 12) + '" r="5" fill="' + col + '"/>';
          }
        });
        return s + '</svg>';
      }

      function pianoVoicing(root, type, inversion, ext) {
        ext = ext || "triad";
        var iv = chordIntervals(type, ext);
        var r = NOTE_IDX[root];
        var notes = iv.map(function(s){ return r+s; });
        for (var k = 0; k < inversion; k++) {
          var low = notes.shift();
          notes.push(low+12);
        }
        var min = Math.min.apply(null, notes);
        var shift = Math.floor(min/12)*12;
        return notes.map(function(n){ return n-shift; });
      }

      // -- panel -----------------------------------------------------------
      function showChord(g) {
        lastChordEl = g;
        voicingIndex = 0;
        chordExt = "triad";
        scaleId = null;
        renderPanel();
        renderScalePanel();
      }

      function renderPanel() {
        var g = lastChordEl;
        if (!g) return;
        var chord = g.getAttribute("data-chord");
        var disp  = g.getAttribute("data-disp");
        var type  = g.getAttribute("data-type");
        var root  = chord.replace(/dim$/, "").replace(/m$/, "");
        var roles = roleMap(root, type, chordExt);
        var panel = document.getElementById("panel");
        panel.classList.remove("empty");

        var extOptions = type === "major"
          ? [["triad","Dreiklang"],["maj7","maj7"]]
          : type === "minor"
          ? [["triad","Dreiklang"],["m7","m7"]]
          : [["triad","Dreiklang"],["m7b5","m7b5"]];

        var toggleHtml = '<div class="ext-toggle">' +
          extOptions.map(function(opt) {
            return '<button data-ext="' + opt[0] + '" class="ext-btn' + (chordExt === opt[0] ? ' active' : '') + '">' + opt[1] + '</button>';
          }).join("") + '</div>';

        var typeLabel = type === "major" ? "Durdreiklang" : type === "minor" ? "Molldreiklang" : "verminderter Dreiklang";

        var body = "";
        if (instrument === "guitar") {
          var voicings = GUITAR[chord] || [];
          if (chordExt !== "triad") {
            var g7key = chordExt === "maj7"  ? root + "maj7"
                      : chordExt === "m7"    ? root + "m7"
                      : root + "m7b5";
            var g7v = GUITAR7[g7key];
            voicings = g7v ? [g7v] : [];
          }
          var v = voicings[voicingIndex] || voicings[0] || null;
          var navHtml = voicings.length > 1
            ? '<div class="voicing-nav">' +
              '<button id="btn-prev-v">&#8249;</button>' +
              '<span>' + (voicingIndex+1) + ' / ' + voicings.length + '</span>' +
              '<button id="btn-next-v">&#8250;</button>' +
              '</div>'
            : '';
          body = '<div class="voicing">' + (v ? renderGuitar(v, chord, type) : "<p style='font-size:13px;color:var(--text-soft)'>Kein Griff hinterlegt.</p>") + navHtml + '<div class="vlabel">Gitarrengriff</div></div>';
        } else {
          var invCount = chordExt === "triad" ? 3 : 4;
          var invLabels = ["Grundstellung","1. Umkehrung","2. Umkehrung","3. Umkehrung"];
          body = "";
          for (var ii = 0; ii < invCount; ii++) {
            var notes = pianoVoicing(root, type, ii, chordExt);
            body += '<div class="voicing">' + pianoSVG(notes, roles) + '<div class="vlabel">' + invLabels[ii] + '</div></div>';
          }
        }

        var septLegend = (chordExt !== "triad")
          ? '<span><i class="dot" style="background:var(--seventh-col)"></i>Septime</span>'
          : '';
        var legend = '<div class="legend">' +
          '<span><i class="dot" style="background:var(--root-col)"></i>Grundton</span>' +
          '<span><i class="dot" style="background:var(--third-col)"></i>Terz</span>' +
          '<span><i class="dot" style="background:var(--fifth-col)"></i>Quinte</span>' +
          septLegend + '</div>';

        panel.innerHTML = '<h2>' + disp + '</h2>' + toggleHtml +
          '<p class="sub">' + typeLabel + ' \u00b7 ' +
          (instrument === "guitar" ? "Gitarrengriff" : "Klaviergriffe") + '</p>' +
          '<div class="voicings">' + body + '</div>' + legend;

        panel.querySelectorAll(".ext-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            chordExt = this.getAttribute("data-ext");
            voicingIndex = 0;
            renderPanel();
          });
        });

        var btnPrev = document.getElementById("btn-prev-v");
        var btnNext = document.getElementById("btn-next-v");
        if (btnPrev) btnPrev.addEventListener("click", function() {
          var voicings2 = GUITAR[lastChordEl.getAttribute("data-chord")] || [];
          voicingIndex = (voicingIndex - 1 + voicings2.length) % voicings2.length;
          renderPanel();
        });
        if (btnNext) btnNext.addEventListener("click", function() {
          var voicings2 = GUITAR[lastChordEl.getAttribute("data-chord")] || [];
          voicingIndex = (voicingIndex + 1) % voicings2.length;
          renderPanel();
        });
      }

      // -- controls --------------------------------------------------------
      var bG = document.getElementById("btn-guitar"), bP = document.getElementById("btn-piano"), bL = document.getElementById("btn-leftie"), lGrp = document.getElementById("leftie-grp");
      bG.addEventListener("click", function () {
        instrument = "guitar"; bG.classList.add("active"); bP.classList.remove("active");
        lGrp.style.display = "";
        if (lastChordEl) { renderPanel(); renderScalePanel(); }
      });
      bP.addEventListener("click", function () {
        instrument = "piano"; bP.classList.add("active"); bG.classList.remove("active");
        lGrp.style.display = "none";
        if (lastChordEl) { renderPanel(); renderScalePanel(); }
      });
      bL.addEventListener("click", function() {
        leftHanded = !leftHanded;
        bL.classList.toggle("active", leftHanded);
        if (lastChordEl) { renderPanel(); renderScalePanel(); }
      });
      var bM = document.getElementById("btn-modes");
      bM.addEventListener("click", function () {
        modesOn = !modesOn;
        bM.textContent = modesOn ? "ausblenden" : "einblenden";
        bM.classList.toggle("active", modesOn);
        document.getElementById("rotate-grp").style.display = modesOn ? "flex" : "none";
        updateStencil();
      });
      document.getElementById("btn-cw").addEventListener("click", function () { rotation++; updateStencil(); });
      document.getElementById("btn-ccw").addEventListener("click", function () { rotation--; updateStencil(); });
      document.getElementById("btn-theme").addEventListener("click", function () {
        var html = document.documentElement;
        var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        // cycle: auto → forced opposite → auto
        if (html.classList.contains("dark")) {
          html.classList.remove("dark"); html.classList.add("light");
        } else if (html.classList.contains("light")) {
          html.classList.remove("light");
        } else {
          html.classList.add(sysDark ? "light" : "dark");
        }
        darkMode = html.classList.contains("dark") || (!html.classList.contains("light") && sysDark);
        // re-colour segment backgrounds
        var segs = svg.querySelectorAll(".seg-bg");
        var fills = darkMode ? SEG_FILL_DARK : SEG_FILL;
        for (var i = 0; i < segs.length; i++) {
          segs[i].setAttribute("fill", fills[i % 12]);
        }
        this.textContent = darkMode ? "☀" : "☽";
      });
      document.addEventListener("keydown", function (e) {
        if (!modesOn) return;
        if (e.key === "ArrowRight" || e.key === "ArrowDown") { rotation++; updateStencil(); e.preventDefault(); }
        if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   { rotation--; updateStencil(); e.preventDefault(); }
      });

      updateStencil();
    })();
  </script>
</body>

</html>
